{% extends "base.html" %}

{% block title %}Login - Social Media Hook Generator{% endblock %}

{% block content %}
<section class="section single-column">
    <div class="auth-card compact-form" data-reveal>
        <div class="eyebrow">Login</div>
        <h3 class="form-heading">Login</h3>
        <p class="form-intro">Sign in to save packs.</p>

        <form action="{{ url_for('login') }}" method="post" data-loading-text="Signing in...">
            <div class="field">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" class="input" required>
            </div>

            <div class="field">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="input" required>
            </div>

            <div class="stack-actions">
                <button type="submit" class="button">Login</button>
            </div>
        </form>

        <div class="link-row" style="margin-top: 18px;">
            <span>Need an account?</span>
            <a href="{{ url_for('register') }}" class="link-accent">Register</a>
        </div>
    </div>
</section>
{% endblock %}
